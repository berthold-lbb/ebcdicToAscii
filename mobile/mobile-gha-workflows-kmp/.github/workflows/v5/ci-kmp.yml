        with:
          ios-working-directory: ${{ inputs.iosWorkingDirectory }}
          xcode-version: ${{ inputs.xcodeVersion }}
          enable-gradle-cache: ${{ inputs.enableGradleCache }}
          enable-konan-cache: ${{ inputs.enableKonanCache }}
          enable-bundler-cache: ${{ inputs.enableBundlerCache }}
          enable-cocoapods-cache: ${{ inputs.enableCocoaPodsCache }}
          run-pod-install: ${{ inputs.iosRunPodInstall }}
          enable-spm-cache: ${{ inputs.enableSpmCache }}
          enable-derived-data-cache: ${{ inputs.enableXcodeDerivedDataCache }}

      - name: Build iOS ${{ matrix.scheme }}
        uses: Desjardins/mobile-gha-workflows-kmp/.github/actions/emerald-mobile-build-ios-app@v5
        with:
          ios-working-directory: ${{ inputs.iosWorkingDirectory }}
          scheme: ${{ matrix.scheme }}
          configuration: ${{ matrix.configuration }}
          profile-type: ${{ matrix.profileType }}
          lane: ${{ matrix.lane }}
          fastlane-env: ${{ matrix.fastlaneEnv }}
          ipa-name: ${{ matrix.ipaName }}
          match-repository: ${{ matrix.matchRepo }}
          match-ref: ${{ inputs.iosMatchRef }}
          match-git-token: ${{ secrets.GIT_PAT }}
          match-keychain-name: ${{ matrix.profileType == 'appstore' && inputs.iosMatchKeychainNameCreation || inputs.iosMatchKeychainName }}
          branch-name: ${{ needs.evaluate.outputs.branch_name }}
          artifact-name: ${{ matrix.artifactName }}
          dry-run: ${{ inputs.dryRun }}

  # ===========================================================================
  # 40 — PUBLISH ANDROID → APPLIVERY (sans rebuild)
  # ===========================================================================
  publish-android-applivery:
    name: 40 - Publish Android AppLivery
    runs-on: ${{ inputs.linuxRunnerLabel }}
    needs: [evaluate, resolve-context, gates, build-android]
    if: ${{ always() && needs.resolve-context.outputs.android_publish_applivery == 'true' && needs.gates.outputs.allow_publish == 'true' && needs.build-android.result == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Import AppLivery tokens from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ inputs.vaultUrl }}
          method: approle
          roleId: ${{ secrets.ROLEID }}
          secretId: ${{ secrets.SECRETID }}
          path: ${{ inputs.vaultPath }}
          secrets: |
            ${{ inputs.vaultSecretsRoot }}/${{ needs.evaluate.outputs.product_name }}/${{ inputs.appliveryTokenDaSecret }} value | APP_LIVERY_API_TOKEN_DA ;
            ${{ inputs.vaultSecretsRoot }}/${{ needs.evaluate.outputs.product_name }}/${{ inputs.appliveryTokenLpSecret }} value | APP_LIVERY_API_TOKEN_LP ;

      - name: Setup Ruby / Bundler
        if: ${{ inputs.androidAppliveryPublishMode == 'fastlane' }}
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: ${{ inputs.enableBundlerCache }}
          working-directory: ${{ inputs.androidFastlaneDirectory }}

      - name: Publish to AppLivery
        uses: Desjardins/mobile-gha-workflows-kmp/.github/actions/emerald-mobile-publish-applivery@v5
        with:
          publish-mode: ${{ inputs.androidAppliveryPublishMode }}
          artifact-pattern: android-*
          fastlane-working-directory: ${{ inputs.androidFastlaneDirectory }}
          fastlane-lane: ${{ inputs.androidAppliveryLane }}
          applivery-tags: 'platform:android,flavor:non-prod'
          branch-name: ${{ needs.evaluate.outputs.branch_name }}
          dry-run: ${{ inputs.dryRun }}

  # ===========================================================================
  # 41 — PUBLISH ANDROID → GOOGLE PLAY (opt-in, sans rebuild)
  # ===========================================================================
  publish-android-google-play:
    name: 41 - Publish Google Play ${{ matrix.brandName }}
    runs-on: ${{ inputs.linuxRunnerLabel }}
    needs: [evaluate, resolve-context, gates, build-android]
    if: ${{ always() && needs.resolve-context.outputs.android_publish_google_play == 'true' && needs.gates.outputs.allow_publish == 'true' && needs.build-android.result == 'success' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-context.outputs.android_matrix) }}
    steps:
      - name: Import Google Play service account from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ inputs.vaultUrl }}
          method: approle
          roleId: ${{ secrets.ROLEID }}
          secretId: ${{ secrets.SECRETID }}
          path: ${{ inputs.vaultPath }}
          secrets: |
            ${{ inputs.vaultSecretsRoot }}/${{ needs.evaluate.outputs.product_name }}/${{ inputs.googlePlaySecret }} serviceAccountJson | GOOGLE_PLAY_SERVICE_ACCOUNT_JSON ;

      - name: Publish AAB ${{ matrix.brandName }}
        uses: Desjardins/mobile-gha-workflows-kmp/.github/actions/emerald-mobile-publish-google-play@v5
        with:
          artifact-name: ${{ matrix.artifactName }}
          package-name: ${{ matrix.packageName }}
          track: ${{ inputs.googlePlayTrack }}
          release-status: ${{ inputs.googlePlayReleaseStatus }}
          dry-run: ${{ inputs.dryRun }}

  # ===========================================================================
  # 42 — PUBLISH iOS → APPLIVERY (sans rebuild)
  # ===========================================================================
  publish-ios-applivery:
    name: 42 - Publish iOS AppLivery ${{ matrix.scheme }}
    runs-on: ${{ inputs.linuxRunnerLabel }}
    needs: [evaluate, resolve-context, gates, build-ios]
    if: ${{ always() && needs.resolve-context.outputs.ios_publish_applivery == 'true' && needs.gates.outputs.allow_publish == 'true' && needs.build-ios.result == 'success' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-context.outputs.ios_matrix) }}
    steps:
      - name: Import AppLivery tokens from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ inputs.vaultUrl }}
          method: approle
          roleId: ${{ secrets.ROLEID }}
          secretId: ${{ secrets.SECRETID }}
          path: ${{ inputs.vaultPath }}
          secrets: |
            ${{ inputs.vaultSecretsRoot }}/${{ needs.evaluate.outputs.product_name }}/${{ inputs.appliveryTokenDaSecret }} value | APP_LIVERY_API_TOKEN_DA ;
            ${{ inputs.vaultSecretsRoot }}/${{ needs.evaluate.outputs.product_name }}/${{ inputs.appliveryTokenLpSecret }} value | APP_LIVERY_API_TOKEN_LP ;

      - name: Publish ${{ matrix.scheme }} to AppLivery
        uses: Desjardins/mobile-gha-workflows-kmp/.github/actions/emerald-mobile-publish-applivery@v5
        with:
          publish-mode: ${{ inputs.iosAppliveryPublishMode }}
          artifact-pattern: ${{ matrix.artifactName }}
          app-token: ${{ env[matrix.appliveryTokenEnv] }}
          binary-glob: '*.ipa'
          applivery-tags: 'platform:ios,flavor:non-prod'
          branch-name: ${{ needs.evaluate.outputs.branch_name }}
          dry-run: ${{ inputs.dryRun }}

  # ===========================================================================
  # 43 — PUBLISH iOS → TESTFLIGHT (altool, sans rebuild — parité Azure)
  # ===========================================================================
  publish-ios-testflight:
    name: 43 - Publish TestFlight ${{ matrix.scheme }}
    runs-on: ${{ inputs.macosRunnerLabel }}
    needs: [evaluate, resolve-context, gates, build-ios]
    if: ${{ always() && needs.resolve-context.outputs.ios_publish_testflight == 'true' && needs.gates.outputs.allow_publish == 'true' && needs.build-ios.result == 'success' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-context.outputs.ios_matrix) }}
    steps:
      - name: Checkout project (mode fastlane uniquement)
        if: ${{ inputs.iosTestflightPublishMode == 'fastlane' }}
        uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.checkoutSubmodules }}
          lfs: true
          token: ${{ secrets.GIT_PAT || github.token }}

      - name: Import App Store Connect secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ inputs.vaultUrl }}
          method: approle
          roleId: ${{ secrets.ROLEID }}
          secretId: ${{ secrets.SECRETID }}
          path: ${{ inputs.vaultPath }}
          secrets: |
            ${{ inputs.vaultSecretsRoot }}/${{ needs.evaluate.outputs.product_name }}/altool-api-key-${{ matrix.brandKey }} value | ALTOOL_API_KEY ;
            ${{ inputs.vaultSecretsRoot }}/${{ needs.evaluate.outputs.product_name }}/altool-api-key-id-${{ matrix.brandKey }} value | ALTOOL_API_KEY_ID ;
            ${{ inputs.vaultSecretsRoot }}/${{ needs.evaluate.outputs.product_name }}/altool-issuer-id-${{ matrix.brandKey }} value | ALTOOL_ISSUER_ID ;

      - name: Publish ${{ matrix.scheme }} to TestFlight
        uses: Desjardins/mobile-gha-workflows-kmp/.github/actions/emerald-mobile-publish-testflight@v5
        with:
          publish-mode: ${{ inputs.iosTestflightPublishMode }}
          artifact-name: ${{ matrix.artifactName }}
          ipa-name: ${{ matrix.ipaName }}
          fastlane-working-directory: ${{ inputs.iosWorkingDirectory }}
          fastlane-env: ${{ matrix.fastlaneEnv }}
          dry-run: ${{ inputs.dryRun }}

  # ===========================================================================
  # 50 — UPDATE BUILD VERSION (parité Azure UpdateBuildVersion)
  # ===========================================================================
  update-build-version:
    name: 50 - Update build version
    runs-on: ${{ inputs.macosRunnerLabel }}
    needs: [evaluate, resolve-context, gates, build-android, build-ios, publish-android-applivery, publish-android-google-play, publish-ios-applivery, publish-ios-testflight]
    if: >-
      ${{ always() && inputs.enableUpdateBuildVersion
          && needs.resolve-context.outputs.run_update_version == 'true'
          && needs.gates.outputs.allow_build == 'true'
          && needs.build-android.result != 'failure'
          && needs.build-ios.result != 'failure'
          && needs.publish-android-applivery.result != 'failure'
          && needs.publish-android-google-play.result != 'failure'
          && needs.publish-ios-applivery.result != 'failure'
          && needs.publish-ios-testflight.result != 'failure' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.evaluate.outputs.branch_name }}
          submodules: ${{ inputs.checkoutSubmodules }}
          lfs: true
          fetch-depth: 0
          token: ${{ secrets.GIT_PAT || github.token }}
          persist-credentials: true

      - name: Import secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ inputs.vaultUrl }}
          method: approle
          roleId: ${{ secrets.ROLEID }}
          secretId: ${{ secrets.SECRETID }}
          path: ${{ inputs.vaultPath }}
          secrets: |
            ${{ inputs.vaultSecretsRoot }}/${{ needs.evaluate.outputs.product_name }}/${{ inputs.artifactoryTokenSecret }} value | ARTIFACTORY_REF_TOKEN ;
            ${{ inputs.androidArkanaSecretsLines == '' && format('{0}/{1}/{2} dotenv | ARKANA_DOTENV ;', inputs.vaultSecretsRoot, needs.evaluate.outputs.product_name, inputs.androidArkanaSecret) || '' }}
            ${{ inputs.azureFeedSecret != '' && format('{0}/{1}/{2} username | CMT_SDK_USERNAME ; {0}/{1}/{2} password | CMT_SDK_PASSWORD ; {0}/{1}/{2} accessToken | SYSTEM_ACCESS_TOKEN ;', inputs.vaultSecretsRoot, needs.evaluate.outputs.product_name, inputs.azureFeedSecret) || '' }}

      - name: Compose flat ArkanaKeys map
        if: ${{ inputs.androidArkanaSecretsLines != '' }}
        id: arkana-map
        shell: bash
        env:
          LINES: ${{ inputs.androidArkanaSecretsLines }}
          PREFIX: ${{ inputs.vaultSecretsRoot }}/${{ needs.evaluate.outputs.product_name }}
        run: |
          set -euo pipefail
          out=""
          names=""
          while IFS= read -r l; do
            l="${l%%;*}"
            l="$(echo "$l" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            [ -z "$l" ] && continue
            out+="$PREFIX/$l ; "
            names+="${l##*| } "
          done <<< "$LINES"
          echo "secrets=$out" >> "$GITHUB_OUTPUT"
          echo "envnames=$names" >> "$GITHUB_OUTPUT"

      - name: Import flat ArkanaKeys from Vault
        if: ${{ inputs.androidArkanaSecretsLines != '' }}
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ inputs.vaultUrl }}
          method: approle
          roleId: ${{ secrets.ROLEID }}
          secretId: ${{ secrets.SECRETID }}
          path: ${{ inputs.vaultPath }}
          secrets: ${{ steps.arkana-map.outputs.secrets }}

      - name: Write androidApp/.env (flat)
        if: ${{ inputs.androidArkanaSecretsLines != '' }}
        shell: bash
        env:
          ENV_NAMES: ${{ steps.arkana-map.outputs.envnames }}
        run: |
          set -euo pipefail
          : > androidApp/.env && chmod 600 androidApp/.env
          for n in $ENV_NAMES; do
            printf '%s=%s\n' "$n" "${!n:-}" >> androidApp/.env
          done

      - name: Export ArkanaKeys (.env + env)
        if: ${{ inputs.androidArkanaSecretsLines == '' }}
        uses: Desjardins/mobile-gha-workflows-kmp/.github/actions/emerald-mobile-export-dotenv@v5
        with:
          dotenv: ${{ env.ARKANA_DOTENV }}
          output-file: androidApp/.env

      - name: Setup Android environment
        uses: Desjardins/mobile-gha-workflows-kmp/.github/actions/emerald-setup-android-env@v5
        with:
          jdk-version: ${{ inputs.androidJdkVersionQuality }}
          setup-bundler: 'false'
          enable-gradle-cache: ${{ inputs.enableGradleCache }}
          enable-konan-cache: ${{ inputs.enableKonanCache }}

      - name: Increment build version
        uses: Desjardins/mobile-gha-workflows-kmp/.github/actions/emerald-mobile-update-build-version@v5
        with:
          git-branch: ${{ needs.evaluate.outputs.branch_name }}
          ios-working-directory: ${{ inputs.iosWorkingDirectory }}
          dry-run: ${{ inputs.dryRun }}

  # ===========================================================================
  # 60 — SUMMARY
  # ===========================================================================
  summary:
    name: 60 - Summary
    runs-on: ${{ inputs.linuxRunnerLabel }}
    needs: [evaluate, resolve-context, gates, quality-shared, quality-android, quality-ios-reports, sonar-ios, build-android, build-ios, publish-android-applivery, publish-android-google-play, publish-ios-applivery, publish-ios-testflight, update-build-version]
    if: ${{ always() }}
    steps:
      - shell: bash
        run: |
          {
            echo "# CI KMP v5 — Résumé"
            echo ""
            echo "| Étape | Résultat |"
            echo "|---|---|"
            echo "| Produit | ${{ needs.evaluate.outputs.product_name }} |"
            echo "| Contexte | ${{ needs.resolve-context.outputs.branch_type }} / ${{ needs.resolve-context.outputs.env_name }} / ${{ needs.resolve-context.outputs.build_configuration }} / ${{ needs.resolve-context.outputs.distribution }} |"
            echo "| Quality shared | ${{ needs.quality-shared.result }} |"
            echo "| Quality Android | ${{ needs.quality-android.result }} |"
            echo "| Quality iOS (reports) | ${{ needs.quality-ios-reports.result }} |"
            echo "| Sonar iOS | ${{ needs.sonar-ios.result }} |"
            echo "| Gates | ${{ needs.gates.outputs.status }} (build=${{ needs.gates.outputs.allow_build }}, publish=${{ needs.gates.outputs.allow_publish }}) |"
            echo "| Build Android | ${{ needs.build-android.result }} |"
            echo "| Build iOS | ${{ needs.build-ios.result }} |"
            echo "| Publish Android AppLivery | ${{ needs.publish-android-applivery.result }} |"
            echo "| Publish Google Play | ${{ needs.publish-android-google-play.result }} |"
            echo "| Publish iOS AppLivery | ${{ needs.publish-ios-applivery.result }} |"
            echo "| Publish TestFlight | ${{ needs.publish-ios-testflight.result }} |"
            echo "| Update build version | ${{ needs.update-build-version.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
