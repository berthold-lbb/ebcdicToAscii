name: "Emerald Mobile Export Dotenv"
description: >
  Exporte un bundle dotenv (KEY=VALUE multi-lignes, typiquement le champ `dotenv`
  d'un secret Vault importé par hashicorp/vault-action) vers un fichier .env et,
  en option, vers GITHUB_ENV. Chaque valeur est masquée dans les logs.
  Couvre les deux chemins de lecture de getEnvValue(): System.getenv() et .env.

inputs:
  dotenv:
    description: "Contenu dotenv. Exemple: sortie ARKANA_DOTENV de vault-action."
    required: true
  output-file:
    description: "Fichier .env à écrire. Exemple: `androidApp/.env`."
    required: false
    default: ""
  export-to-github-env:
    description: "Exporte aussi vers GITHUB_ENV. Exemple: `true`."
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - shell: bash
      env:
        DOTENV_CONTENT: ${{ inputs.dotenv }}
        OUTPUT_FILE: ${{ inputs.output-file }}
        EXPORT_ENV: ${{ inputs.export-to-github-env }}
      run: |
        set -euo pipefail

        if [[ -n "$OUTPUT_FILE" ]]; then
          mkdir -p "$(dirname "$OUTPUT_FILE")"
          : > "$OUTPUT_FILE"
          chmod 600 "$OUTPUT_FILE" || true
        fi

        count=0
        while IFS= read -r line || [[ -n "$line" ]]; do
          line="${line//$'\r'/}"
          [[ -z "$line" ]] && continue
          [[ "$line" == \#* ]] && continue
          line="${line#export }"
          key="${line%%=*}"
          value="${line#*=}"
          # Noms de variables simples uniquement
          [[ "$key" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]] || { echo "Clé ignorée: $key" >&2; continue; }
          # Retire les quotes éventuelles
          value="${value%\"}"; value="${value#\"}"
          value="${value%\'}"; value="${value#\'}"
          echo "::add-mask::$value"
          [[ -n "$OUTPUT_FILE" ]] && printf '%s=%s\n' "$key" "$value" >> "$OUTPUT_FILE"
          if [[ "$EXPORT_ENV" == "true" ]]; then
            printf '%s=%s\n' "$key" "$value" >> "$GITHUB_ENV"
          fi
          count=$((count+1))
        done <<< "$DOTENV_CONTENT"

        echo "$count variable(s) exportée(s)${OUTPUT_FILE:+ vers $OUTPUT_FILE}."
