# Exemple consommateur v5 — ui-ad-digital-mobile/.github/workflows/mobile-ci-kmp.yml
#
# Minimal grâce aux conventions (parité ci-android v7) :
#   - productName résolu via custom_properties.product (sinon nom du repo)
#   - vaultUrl/vaultPath/sonarqubeUrl/runners depuis les vars d'organisation
#   - tous les secrets applicatifs dans Vault sous concourse/<product>/...
#   - seuls ROLEID/SECRETID (+ GIT_PAT optionnel) côté GitHub

name: CI ui-ad-digital-mobile (KMP)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, 'release/**', 'release-gia/**']
  push:
    branches: [main, 'rc/**', 'release/**', 'release-gia/**', applivery-archives]
  workflow_dispatch:
    inputs:
      platform:
        type: choice
        default: all
        options: [all, shared, android, ios]
      androidBrand:
        type: choice
        default: all
        options: [all, dgag, tpic]
      iosScheme:
        type: choice
        default: all
        options: [all, dgag, tpic]
      distribution:
        type: choice
        default: none
        options: [none, applivery, testflight]
      dryRun:
        type: boolean
        default: false

permissions:
  contents: write
  actions: read
  checks: write

jobs:
  ci-kmp:
    uses: Desjardins/mobile-gha-workflows-kmp/.github/workflows/v5/ci-kmp.yml@v5
    with:
      # Identité — optionnel si custom_properties.product est défini sur le repo.
      productName: ui-ad-digital-mobile

      # Clé Sonar iOS héritée d'Azure
      iosSonarProjectKey: 'com.desjardins.appsmobilesdgag:ui-ad-digital-mobile-ios'

      # Pods/ est commité → pas de pod install ni de cache Pods.
      iosRunPodInstall: false
      enableCocoaPodsCache: false

      # Transition Azure Artifacts (retirer quand les dépendances seront sur Artifactory)
      azureFeedSecret: azure-feed

      # ------------------------------------------------------------------
      # Vault PLATE (un secret par clé, champ `value`) — correspond à la
      # Vault existante de l'org. Format: <nom-secret> <champ> | <ENV_VAR>
      # Le préfixe concourse/<product>/ est ajouté automatiquement.
      # Chaque variable est exportée en env ET écrite dans androidApp/.env.
      # ------------------------------------------------------------------
      androidArkanaSecretsLines: |
        dragon-server-api-key-dev value | DragonServerApiKeyDev
        dragon-server-api-key-qa value | DragonServerApiKeyQA
        dragon-server-api-key-certif value | DragonServerApiKeyCertif
        dragon-server-api-key-gia002 value | DragonServerApiKeyGIA002
        dragon-server-api-key-gia003 value | DragonServerApiKeyGIA003
        dragon-server-api-key-prod value | DragonServerApiKeyProd
        google-places-api-key-qa-da value | GooglePlacesApiKeyQADA
        google-places-api-key-qa-lp value | GooglePlacesApiKeyQALP
        cmt-api-key-accpc100-da value | CmtApiKeyAccpc100DA
        cmt-api-key-accpc200-da value | CmtApiKeyAccpc200DA
        cmt-api-key-accpc300-da value | CmtApiKeyAccpc300DA
        cmt-api-key-accpc400-da value | CmtApiKeyAccpc400DA
        cmt-api-key-prod-da value | CmtApiKeyProdDA
        cmt-api-key-accpc100-lp value | CmtApiKeyAccpc100LP
        cmt-api-key-accpc200-lp value | CmtApiKeyAccpc200LP
        cmt-api-key-accpc300-lp value | CmtApiKeyAccpc300LP
        cmt-api-key-accpc400-lp value | CmtApiKeyAccpc400LP
        cmt-api-key-prod-lp value | CmtApiKeyProdLP
        keystore-debug-password value | KeystoreDebugPassword
        keystore-dgag-qa-password value | KeystoreDgagQaPassword
        keystore-tpic-qa-password value | KeystoreTpicQaPassword
        google-maps-api-key-tpic-prod value | GoogleMapsApiKeyTpicProd
        google-maps-api-key-dgag-prod value | GoogleMapsApiKeyDgagProd
        google-maps-api-key-qa value | GoogleMapsApiKeyQA
        onetrust-app-id-tpic-qa value | OneTrustAppIdTpicQa
        onetrust-app-id-dgag-qa value | OneTrustAppIdDgagQa
        onetrust-app-id-tpic-prod value | OneTrustAppIdTpicProd
        onetrust-app-id-dgag-prod value | OneTrustAppIdDgagProd
        encrypted-storage-key value | EncryptedStorageKey
      # ⚠️ Ajuster les noms de gauche aux noms EXACTS de la Vault
      # (l'écran montre applivery-token-da, altool-api-key-dgag, etc.)

      iosArkanaSecretsLines: |
        dragon-server-api-key-qa value | DragonServerApiKeyQA
        onetrust-api-key-qa-da value | OneTrustApiKeyQADA
        onetrust-api-key-qa-lp value | OneTrustApiKeyQALP
        google-maps-api-key-qa-da value | GoogleMapsApiKeyQADA
        google-maps-api-key-qa-lp value | GoogleMapsApiKeyQALP
        encrypted-storage-key value | EncryptedStorageKey
      # ... compléter avec la liste iOS complète (Cmt*, OneTrust*, etc.)

      # Overrides manuels
      manualPlatform: ${{ github.event_name == 'workflow_dispatch' && inputs.platform || '' }}
      manualAndroidBrand: ${{ github.event_name == 'workflow_dispatch' && inputs.androidBrand || '' }}
      manualIosScheme: ${{ github.event_name == 'workflow_dispatch' && inputs.iosScheme || '' }}
      manualDistribution: ${{ github.event_name == 'workflow_dispatch' && inputs.distribution || '' }}
      dryRun: ${{ github.event_name == 'workflow_dispatch' && inputs.dryRun || false }}
    secrets:
      ROLEID: ${{ secrets.ROLEID }}
      SECRETID: ${{ secrets.SECRETID }}
      GIT_PAT: ${{ secrets.GIT_PAT }}
