# =============================================================================
# Exemple consommateur v6 — ui-ad-digital-mobile/.github/workflows/
#
# TOUTES les options sont montrées, groupées par thème, avec leur valeur par
# défaut. Les lignes marquées [défaut] peuvent être SUPPRIMÉES sans changer le
# comportement — elles sont là pour documenter ce qui est personnalisable.
# La version minimale fonctionnelle tient en ~15 lignes (voir le bas du fichier).
# =============================================================================

name: CI ui-ad-digital-mobile (KMP)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, 'release/**', 'release-gia/**']
  push:
    branches: [main, 'rc/**', 'release/**', 'release-gia/**', applivery-archives]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Plateformes à exécuter (all = shared + android + ios).'
        type: choice
        default: all
        options: [all, shared, android, ios]
      androidBrand:
        description: 'Brand Android à builder (all = dgag + tpic).'
        type: choice
        default: all
        options: [all, dgag, tpic]
      iosScheme:
        description: 'Scheme iOS à builder (all = dgag + tpic).'
        type: choice
        default: all
        options: [all, dgag, tpic]
      distribution:
        description: 'Canal de distribution (none = build seul, sans publication).'
        type: choice
        default: none
        options: [none, applivery, testflight]
      dryRun:
        description: 'Exécution à blanc : pas de publication ni de tag, pour valider le pipeline.'
        type: boolean
        default: false

permissions:
  contents: write
  actions: read
  checks: write

jobs:
  ci-kmp:
    uses: Desjardins/mobile-gha-workflows-kmp/.github/workflows/v6/ci-kmp.yml@v6
    with:
      # ------------------------------------------------------------------
      # IDENTITÉ — comment le CI sait "qui" il build.
      # productName → chemin Vault concourse/<productName>/...
      # Optionnel si la custom property `product` est définie sur le repo.
      # ------------------------------------------------------------------
      componentName: ui-ad-digital-mobile
      productName: ${{ github.event.repository.custom_properties.product }}

      # Runner macOS pour les jobs iOS (quality-ios, build-ios, publish-ios).
      # Sans ce label, vars.DEFAULT_MACOS_RUNNER_LABEL est vide et les jobs iOS
      # ne démarrent pas. Parité Azure (vmImage: macOS-15). Adapter au groupe de
      # runners macOS self-hosted de l'org si nécessaire.
      macosRunnerLabel: macos-15

      # ------------------------------------------------------------------
      # MODULES / DOSSIERS — comment le CI sait "où" sont shared/android/ios.
      # C'est la réponse à "comment le ci connaît les différents dossiers" :
      #   - les deux modules Gradle sont des inputs ; toutes les tâches
      #     qualité en sont DÉRIVÉES (':shared' → ':shared:testDebugUnitTest'...)
      #   - iOS n'est pas un module Gradle : c'est un répertoire (Gemfile,
      #     Fastfile, xcodeproj) → input de chemin.
      #   - le Fastfile Android vit dans androidApp → input de chemin aussi.
      # Un autre projet KMP avec :core / appAndroid / ios/ ne change QUE ces
      # 4 lignes — aucune tâche Gradle à réécrire.
      # ------------------------------------------------------------------
      sharedModule: ':shared'                  # [défaut]
      androidModule: ':androidApp'             # [défaut]
      iosWorkingDirectory: iosApp              # [défaut]
      androidFastlaneDirectory: androidApp     # [défaut]

      # ------------------------------------------------------------------
      # PLATEFORMES — interrupteurs généraux (resolve-context les croise
      # avec la branche et manualPlatform pour décider quels jobs partent).
      # ------------------------------------------------------------------
      enableShared: true                       # [défaut]
      enableAndroid: true                      # [défaut]
      enableIos: true                          # [défaut]

      # ------------------------------------------------------------------
      # QUALITY GATES — politique validée :
      # build OK si gates success/explicitement skipped, publish bloqué si
      # un gate requis est skipped (sauf override).
      # NB: il n'y a PAS de "qualityMatrixMode: smoke" — ce concept du vieux
      # scaffold est remplacé par la table de décision : en PR, resolve-context
      # restreint automatiquement aux brand/scheme par défaut (= smoke) ;
      # sur main/rc/release, matrice complète (= full).
      # ------------------------------------------------------------------
      # build.gradle.kts ne déclare que des flavors *Qa/*Prod : release-gia/*
      # (env Beta) doit construire le flavor Prod (assembleDgagProdRelease).
      androidEnvFlavorMap: '{"Beta":"Prod"}'

      # getEnvValue() de build.gradle.kts LÈVE UNE EXCEPTION à la configuration
      # Gradle si une clé manque — et les signingConfigs sont évalués pour
      # TOUTE invocation (y compris :shared:*). Les ArkanaKeys doivent donc
      # être chargées aussi pour la qualité shared.
      sharedQualityArkana: true

      # ------------------------------------------------------------------
      # SDK ANDROID (runner self-hosted sans SDK pré-installé)
      # emerald-setup-android-env détecte le SDK ; s'il est absent il fait un
      # bootstrap shell des cmdline-tools (~150 Mo) + accepte les licences sans
      # interaction, le tout mis en cache dans ~/android-sdk.
      #
      # PAS BESOIN de renseigner compileSdkVersion/buildToolsVersion ici :
      #   - AGP lit déjà compileSdk/buildTools depuis build.gradle.kts ;
      #   - avec les cmdline-tools + licences acceptées, AGP télécharge tout seul
      #     la bonne plateforme au build ;
      #   - le cache ~/android-sdk capture ce que AGP a téléchargé → re-téléchargé
      #     une seule fois. Donc zéro duplication de valeurs entre les deux repos.
      # Ne les renseigner QUE si tu veux forcer un pré-install explicite (cas rare).
      #
      # ⚠️ Le bootstrap est actif par défaut (install-android-sdk=true côté action).
      # NE PAS mettre install-android-sdk: false sauf runner air-gapped — sinon le
      # SDK n'est jamais installé et le build échoue (« SDK Android introuvable »).

      enableQualityGates: true                 # [défaut]
      enableSharedQualityGate: true            # [défaut]
      enableAndroidQualityGate: true           # [défaut]
      enableIosQualityGate: true               # [défaut]
      allowBuildWhenQualityGateSkipped: true   # [défaut]
      allowPublishWhenQualityGateSkipped: false # [défaut]
      enableSonar: true                        # [défaut]
      sonarQualityGateWait: true               # [défaut]
      iosSonarProjectKey: 'com.desjardins.addigitalmobile:ui-ad-digital-mobile-ios'
      # ^ nouvelle clé Sonar (org ad-digital-mobile) — créer/renommer le projet Sonar en conséquence

      # ------------------------------------------------------------------
      # CACHES — politique validée (cf. README §Caches).
      # Pods/ est commité dans ce projet → pod install et cache inutiles.
      # ------------------------------------------------------------------
      enableGradleCache: true                  # [défaut]
      enableAndroidSdkCache: true              # [défaut]
      enableBundlerCache: true                 # [défaut]
      enableCocoaPodsCache: false              # Pods/ commité
      iosRunPodInstall: false                  # [défaut]
      enableSpmCache: false                    # [défaut] pas de dépendance SPM
      enableXcodeDerivedDataCache: false       # [défaut] invalidation peu fiable
      enableKonanCache: true                   # [défaut] critique sur iOS KMP

      # ------------------------------------------------------------------
      # PUBLICATION — modes et stratégie de branches.
      # ------------------------------------------------------------------
      enableAppLivery: true                    # [défaut] main/rc/applivery-archives
      enableTestFlight: true                   # [défaut] release/* et release-gia/*
      enableGooglePlay: false                  # [défaut] AAB reste en artefact (= Azure)
      # v6 : le job 50 (update-build-version) est SUPPRIMÉ. Le versionCode Android
      # vient de github.run_number + versionCodeOffset (plus de commit de bump).
      # enableUpdateBuildVersion est déprécié et sans effet (conservé pour compat).
      enableUpdateBuildVersion: false          # [défaut, déprécié v6]
      # ⚠️ Mettre versionCodeOffset ≥ au dernier VERSION_CODE Android publié au store
      # (et ≥ au dernier build number iOS, ~32012) pour rester strictement croissant.
      versionCodeOffset: "0"                    # [défaut] À RÉGLER avant la 1re publication
      androidAppliveryPublishMode: fastlane    # [défaut] lane applivery_deploy (parité Azure)
      iosAppliveryPublishMode: api             # [défaut] upload API, sans rebuild
      iosTestflightPublishMode: altool         # [défaut] altool, sans rebuild

      # ------------------------------------------------------------------
      # VAULT — la Vault de l'org est PLATE (un secret par clé, champ value).
      # Une ligne par clé ; préfixe concourse/<product>/ ajouté automatiquement.
      # Chaque valeur est masquée, exportée en env ET écrite dans androidApp/.env.
      # ⚠️ Les noms de gauche doivent correspondre EXACTEMENT à la Vault.
      # ------------------------------------------------------------------
      androidArkanaSecretsLines: |
        dragon-api-key-dev value | DragonServerApiKeyDev
        dragon-api-key-qa value | DragonServerApiKeyQA
        dragon-api-key-certif value | DragonServerApiKeyCertif
        dragon-api-key-gia002 value | DragonServerApiKeyGIA002
        dragon-api-key-gia003 value | DragonServerApiKeyGIA003
        dragon-api-key-prod value | DragonServerApiKeyProd
        google-places-api-key-qa-da value | GooglePlacesApiKeyQADA
        google-places-api-key-qa-lp value | GooglePlacesApiKeyQALP
        google-maps-api-key-qa value | GoogleMapsApiKeyQA
        google-maps-api-key-qa-da value | GoogleMapsApiKeyQADA
        google-maps-api-key-qa-lp value | GoogleMapsApiKeyQALP
        google-maps-api-key-dgag-prod value | GoogleMapsApiKeyDgagProd
        google-maps-api-key-tpic-prod value | GoogleMapsApiKeyTpicProd
        google-maps-api-key-prod-da value | GoogleMapsApiKeyProdDA
        google-maps-api-key-prod-lp value | GoogleMapsApiKeyProdLP
        cmt-api-key-accpc100-da value | CmtApiKeyAccpc100DA
        cmt-api-key-accpc200-da value | CmtApiKeyAccpc200DA
        cmt-api-key-accpc300-da value | CmtApiKeyAccpc300DA
        cmt-api-key-accpc400-da value | CmtApiKeyAccpc400DA
        cmt-api-key-certif-da value | CmtApiKeyCertifDA
        cmt-api-key-prod-da value | CmtApiKeyProdDA
        cmt-api-key-systc100-da value | CmtApiKeySystc100DA
        cmt-api-key-systc200-da value | CmtApiKeySystc200DA
        cmt-api-key-systc300-da value | CmtApiKeySystc300DA
        cmt-api-key-systc400-da value | CmtApiKeySystc400DA
        cmt-api-key-accpc100-lp value | CmtApiKeyAccpc100LP
        cmt-api-key-accpc200-lp value | CmtApiKeyAccpc200LP
        cmt-api-key-accpc300-lp value | CmtApiKeyAccpc300LP
        cmt-api-key-accpc400-lp value | CmtApiKeyAccpc400LP
        cmt-api-key-certif-lp value | CmtApiKeyCertifLP
        cmt-api-key-prod-lp value | CmtApiKeyProdLP
        cmt-api-key-systc100-lp value | CmtApiKeySystc100LP
        cmt-api-key-systc200-lp value | CmtApiKeySystc200LP
        cmt-api-key-systc300-lp value | CmtApiKeySystc300LP
        cmt-api-key-systc400-lp value | CmtApiKeySystc400LP
        onetrust-app-id-dgag-qa value | OneTrustAppIdDgagQa
        onetrust-app-id-tpic-qa value | OneTrustAppIdTpicQa
        onetrust-app-id-dgag-prod value | OneTrustAppIdDgagProd
        onetrust-app-id-tpic-prod value | OneTrustAppIdTpicProd
        onetrust-api-key-qa-da value | OneTrustApiKeyQADA
        onetrust-api-key-qa-lp value | OneTrustApiKeyQALP
        onetrust-api-key-certif value | OneTrustApiKeyCertif
        onetrust-api-key-gia002 value | OneTrustApiKeyGIA002
        onetrust-api-key-gia003 value | OneTrustApiKeyGIA003
        onetrust-api-key-prod-da value | OneTrustApiKeyProdDA
        onetrust-api-key-prod-lp value | OneTrustApiKeyProdLP
        keystore-debug-password value | KeystoreDebugPassword
        keystore-dgag-qa-password value | KeystoreDgagQaPassword
        keystore-dgag-password value | KeystoreDgagPassword
        keystore-tpic-qa-password value | KeystoreTpicQaPassword
        keystore-tpic-password value | KeystoreTpicPassword
        dapi-client-id value | DapiClientId
        dapi-client-secret value | DapiClientSecret
        encrypted-storage-key value | EncryptedStorageKey
      # KeystoreDgagPassword / KeystoreTpicPassword : requis par les
      # signingConfigs Prod de build.gradle.kts (getEnvValue).

      # iOS : liste dérivée du VRAI iosApp/.arkana.yml (global_secrets) — 39 clés.
      # DIFFÉRENTE d'Android : PAS de keystore/dapi/encrypted-storage ; OneTrust en
      # OneTrustApiKey* (et non OneTrustAppId*) ; CMT inclut les Systc* ; Google Maps
      # en QADA/QALP/ProdDA/ProdLP (et non QA/DgagProd/TpicProd).
      # ⚠️ Les noms d'env (droite du |) DOIVENT matcher iosApp/.arkana.yml EXACTEMENT.
      # ⚠️ CmtApiKeyCertif1FDA porte un "1F" (pas d'équivalent LP) → VÉRIFIER le nom
      #    du secret Vault à gauche (cmt-api-key-certif1f-da est une supposition).
      # NB v6 : match (signing) et altool (TestFlight) ne sont PLUS dans cette liste —
      # le job seal-ios-secrets les lit séparément (matrix.signingVaultProfile / brandKey).
      iosArkanaSecretsLines: |
        dragon-api-key-dev value | DragonServerApiKeyDev
        dragon-api-key-qa value | DragonServerApiKeyQA
        dragon-api-key-certif value | DragonServerApiKeyCertif
        dragon-api-key-gia002 value | DragonServerApiKeyGIA002
        dragon-api-key-gia003 value | DragonServerApiKeyGIA003
        dragon-api-key-prod value | DragonServerApiKeyProd
        onetrust-api-key-qa-da value | OneTrustApiKeyQADA
        onetrust-api-key-qa-lp value | OneTrustApiKeyQALP
        onetrust-api-key-certif value | OneTrustApiKeyCertif
        onetrust-api-key-gia002 value | OneTrustApiKeyGIA002
        onetrust-api-key-gia003 value | OneTrustApiKeyGIA003
        onetrust-api-key-prod-da value | OneTrustApiKeyProdDA
        onetrust-api-key-prod-lp value | OneTrustApiKeyProdLP
        cmt-api-key-systc100-da value | CmtApiKeySystc100DA
        cmt-api-key-systc200-da value | CmtApiKeySystc200DA
        cmt-api-key-systc300-da value | CmtApiKeySystc300DA
        cmt-api-key-systc400-da value | CmtApiKeySystc400DA
        cmt-api-key-accpc100-da value | CmtApiKeyAccpc100DA
        cmt-api-key-accpc200-da value | CmtApiKeyAccpc200DA
        cmt-api-key-accpc300-da value | CmtApiKeyAccpc300DA
        cmt-api-key-accpc400-da value | CmtApiKeyAccpc400DA
        cmt-api-key-certif1f-da value | CmtApiKeyCertif1FDA
        cmt-api-key-prod-da value | CmtApiKeyProdDA
        cmt-api-key-systc100-lp value | CmtApiKeySystc100LP
        cmt-api-key-systc200-lp value | CmtApiKeySystc200LP
        cmt-api-key-systc300-lp value | CmtApiKeySystc300LP
        cmt-api-key-systc400-lp value | CmtApiKeySystc400LP
        cmt-api-key-accpc100-lp value | CmtApiKeyAccpc100LP
        cmt-api-key-accpc200-lp value | CmtApiKeyAccpc200LP
        cmt-api-key-accpc300-lp value | CmtApiKeyAccpc300LP
        cmt-api-key-accpc400-lp value | CmtApiKeyAccpc400LP
        cmt-api-key-certif-lp value | CmtApiKeyCertifLP
        cmt-api-key-prod-lp value | CmtApiKeyProdLP
        google-places-api-key-qa-da value | GooglePlacesApiKeyQADA
        google-places-api-key-qa-lp value | GooglePlacesApiKeyQALP
        google-maps-api-key-qa-da value | GoogleMapsApiKeyQADA
        google-maps-api-key-qa-lp value | GoogleMapsApiKeyQALP
        google-maps-api-key-prod-da value | GoogleMapsApiKeyProdDA
        google-maps-api-key-prod-lp value | GoogleMapsApiKeyProdLP

      # iOS Match (signature) — noms Vault IRRÉGULIERS, donc mapping explicite
      # (le template régulier ne marche pas : dgag→fede en appstore, tpic→lp).
      # Parité Azure : en enterprise/applivery, dgag ET tpic partagent le cert
      # enterprise dgag (MATCH_PASSWORD_DGAG_ENT). Le job seal lit ces secrets.
      iosMatchSecretMap: >-
        {
          "dgag-enterprise": "match-password-dgag-ent",
          "tpic-enterprise": "match-password-dgag-ent",
          "dgag-appstore": "match-password-fede-public",
          "tpic-appstore": "match-password-lp-public"
        }

      # Credentials du repo Maven CMT Telematics (artifactory.cmtelematics.com,
      # root build.gradle.kts) — RIEN à voir avec Azure DevOps ni le submodule.
      # Les defaults correspondent aux secrets plats déjà présents dans la
      # Vault (cmt-sdk-username / cmt-sdk-password, champ value) → rien à
      # passer ici. Exportés en CMT_SDK_*/cmtSdk* (deux casses).
      mavenFeedUsernameSecret: cmt-sdk-username   # [défaut]
      mavenFeedPasswordSecret: cmt-sdk-password   # [défaut]

      # ------------------------------------------------------------------
      # OVERRIDES MANUELS (workflow_dispatch)
      # ------------------------------------------------------------------
      manualPlatform: ${{ github.event_name == 'workflow_dispatch' && inputs.platform || '' }}
      manualAndroidBrand: ${{ github.event_name == 'workflow_dispatch' && inputs.androidBrand || '' }}
      manualIosScheme: ${{ github.event_name == 'workflow_dispatch' && inputs.iosScheme || '' }}
      manualDistribution: ${{ github.event_name == 'workflow_dispatch' && inputs.distribution || '' }}
      dryRun: ${{ github.event_name == 'workflow_dispatch' && inputs.dryRun || false }}
    secrets:
      # Seuls les credentials AppRole Vault restent des secrets GitHub.
      # Le PAT GitHub (submodule privé, Match, push) est lu depuis Vault via
      # l'input gitPatSecret (défaut: git-user-access-token) — ne plus passer GIT_PAT ici.
      ROLEID: ${{ secrets.ROLEID }}
      SECRETID: ${{ secrets.SECRETID }}

# =============================================================================
# VERSION MINIMALE équivalente (tous les [défaut] supprimés) :
#
#   jobs:
#     ci-kmp:
#       uses: Desjardins/mobile-gha-workflows-kmp/.github/workflows/v6/ci-kmp.yml@v6
#       with:
#         productName: ui-ad-digital-mobile
#         iosSonarProjectKey: 'com.desjardins.addigitalmobile:ui-ad-digital-mobile-ios'
#         enableCocoaPodsCache: false
#         sharedQualityArkana: true
#         androidArkanaSecretsLines: |
#           ... (la liste des clés ci-dessus)
#         iosArkanaSecretsLines: |
#           ... (la liste iOS)
#       secrets:
#         ROLEID: ${{ secrets.ROLEID }}
#         SECRETID: ${{ secrets.SECRETID }}
#         GIT_PAT: ${{ secrets.GIT_PAT }}
# =============================================================================