Je suis arrivé dans l'équipe en mars 2026. Mon intégration a été ralentie au départ par des délais administratifs pour l'obtention de mon matériel et de mes accès. Malgré ce contexte, l'équipe est très positive et accueillante, ce qui m'a permis de m'intégrer rapidement.
Ma plus grande fierté pour cette première moitié d'année est d'avoir pu mettre à profit mon expertise existante sur GitHub Actions pour mener la migration de l'ensemble des pipelines Azure vers GitHub Actions, et d'avoir ainsi aidé l'équipe dans cette transition. J'ai également complété l'ensemble de mes formations de sécurité obligatoires et mes formations Secure Code Warrior dans les délais prévus.
Pour la suite, je souhaite orienter le développement de mes compétences vers le développement mobile Android en Kotlin Multiplatform (KMP).